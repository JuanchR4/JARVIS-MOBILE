<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS OS - Dual Robotics Industries</title>
    <style>
        :root { --glow: #00d4ff; --danger: #ff3c00; --bg: #000b0d; }
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; text-transform: uppercase; }
        .branding { margin-bottom: 20px; letter-spacing: 4px; font-weight: bold; text-shadow: 0 0 10px var(--glow); }
        .reactor { width: 200px; height: 200px; border-radius: 50%; border: 4px double var(--glow); box-shadow: 0 0 20px var(--glow); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .core { width: 60px; height: 60px; background: white; border-radius: 50%; box-shadow: 0 0 30px white, 0 0 50px var(--glow); }
        .listening { border-color: var(--danger); box-shadow: 0 0 30px var(--danger); }
        #console { margin-top: 30px; font-size: 0.8rem; text-align: center; height: 40px; width: 80%; }
    </style>
</head>
<body onclick="start()">
    <div class="branding">DUAL ROBOTICS INDUSTRIES</div>
    <div class="reactor" id="ring"><div class="core"></div></div>
    <div id="console">TOQUE PARA INICIAR PROTOCOLO</div>

    <script>
        const ring = document.getElementById('ring');
        const consoleLog = document.getElementById('console');
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let active = false;

        function speak(text) {
            if (recognition) recognition.stop();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'es-ES';
            u.onend = () => { if(active) recognition.start(); };
            synth.speak(u);
            consoleLog.innerText = "JARVIS: " + text;
        }

        function start() {
            if (active) return;
            active = true;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-CO';
            recognition.onstart = () => ring.classList.add('listening');
            recognition.onend = () => ring.classList.remove('listening');
            
            recognition.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                consoleLog.innerText = ">> " + cmd;

                if (cmd.includes("voltaje") && cmd.includes("298")) {
                    speak("El voltaje máximo del L298N es de 35 voltios, señor.");
                } else if (cmd.includes("quién eres") || cmd.includes("dual robotics")) {
                    speak("Soy JARVIS, la interfaz de Dual Robotics Industries.");
                } else if (cmd.includes("hola") || cmd.includes("jarvis")) {
                    speak("A su servicio, señor.");
                } else {
                    speak("Comando no reconocido en la base de datos.");
                }
            };
            
            speak("Sistemas en línea. Escuchando, señor.");
        }
    </script>
</body>
</html>
