<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS OS - Dual Robotics Industries</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow: #00d4ff;
            --danger: #ff3c00;
            --bg: #000b0d;
            --glass: rgba(0, 212, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Exo 2', sans-serif; cursor: none; }
        body { background: var(--bg); color: var(--glow); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; animation: grid-move 20s linear infinite; }
        @keyframes grid-move { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        .hud-frame { position: absolute; width: 95%; height: 95%; border: 1px solid rgba(0, 212, 255, 0.2); pointer-events: none; }
        
        .branding { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 15px var(--glow); text-align: center; }

        .reactor-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }
        .reactor-outer { position: absolute; width: 100%; height: 100%; border: 2px dashed var(--glow); border-radius: 50%; animation: spin 10s linear infinite; opacity: 0.3; }
        
        .reactor { width: 200px; height: 200px; border-radius: 50%; border: 4px double var(--glow); box-shadow: 0 0 30px var(--glow), inset 0 0 30px var(--glow); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; z-index: 10; }
        .core { width: 70px; height: 70px; background: #fff; border-radius: 50%; box-shadow: 0 0 40px #fff, 0 0 60px var(--glow); transition: 0.3s; }
        
        .listening { border-color: var(--danger); box-shadow: 0 0 50px var(--danger), inset 0 0 30px var(--danger); transform: scale(1.05); }
        .listening .core { box-shadow: 0 0 40px #fff, 0 0 60px var(--danger); }

        .status-bar { position: absolute; bottom: 40px; width: 80%; display: flex; justify-content: space-between; font-size: 0.7rem; border-top: 1px solid rgba(0, 212, 255, 0.2); padding-top: 15px; }
        #console { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 0.8rem; text-align: center; max-width: 80%; line-height: 1.5; text-shadow: 0 0 5px var(--glow); margin-top: 20px; min-height: 3em; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #cursor { width: 20px; height: 20px; border: 1px solid var(--glow); position: fixed; pointer-events: none; border-radius: 50%; transform: translate(-50%, -50%); z-index: 999; }
    </style>
</head>
<body onclick="initJarvis()">
    <div class="bg-grid"></div>
    <div class="hud-frame"></div>
    <div id="cursor"></div>

    <div class="branding">
        <h2>JARVIS OS</h2>
        <p style="font-size: 0.6rem; opacity: 0.7;">DUAL ROBOTICS INDUSTRIES</p>
    </div>

    <div class="reactor-container">
        <div class="reactor-outer"></div>
        <div class="reactor" id="ring">
            <div class="core"></div>
        </div>
    </div>

    <div id="console">HAGA CLIC PARA ACTIVAR INTERFAZ NEURAL</div>

    <div class="status-bar">
        <span>ENLACE: ESTABLE</span>
        <span id="mainframe-status">MAINFRAME: CONECTADO</span>
        <span>SECURE: AES-256</span>
    </div>

    <script>
        const ring = document.getElementById('ring');
        const consoleLog = document.getElementById('console');
        const mainframeStatus = document.getElementById('mainframe-status');
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isStarted = false;
        
        // Memoria local de aprendizaje
        const localMemory = {
            "quién eres": "Soy Jarvis, la interfaz de inteligencia artificial de Dual Robotics Industries.",
            "dual robotics": "Dual Robotics Industries es su corporación tecnológica señor. Estamos liderando el futuro de la robótica.",
            "voltaje": "El voltaje máximo de alimentación para el módulo L 298 N es de 35 voltios.",
            "l298n": "El módulo L 298 N es un controlador de motores de doble puente H. Soporta hasta 35 voltios.",
            "titanio": "El punto de fusión del titanio es de mil seiscientos sesenta y ocho grados Celsius, señor.",
            "hola": "A su servicio, señor. ¿Qué protocolos iniciamos hoy?",
            "buenos días": "Buenos días, señor. Todos los sistemas operativos."
        };

        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function speak(text) {
            if (recognition) recognition.stop();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'es-ES';
            u.pitch = 0.9;
            u.rate = 1;
            
            u.onstart = () => {
                mainframeStatus.innerText = "MAINFRAME: TRANSMITIENDO";
                mainframeStatus.style.color = "#fff";
            };
            
            u.onend = () => {
                mainframeStatus.innerText = "MAINFRAME: CONECTADO";
                mainframeStatus.style.color = "var(--glow)";
                if(isStarted) startListening(); 
            };
            
            synth.speak(u);
            consoleLog.innerText = "JARVIS: " + text;
        }

        function startListening() {
            try { recognition.start(); } catch(e) {}
        }

        function initJarvis() {
            if (isStarted) return;
            isStarted = true;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-CO';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                ring.classList.add('listening');
                consoleLog.innerText = "ESCUCHANDO...";
            };

            recognition.onend = () => {
                ring.classList.remove('listening');
            };

            recognition.onerror = (e) => {
                if (isStarted && e.error !== 'no-speech') {
                    setTimeout(startListening, 500);
                } else if (e.error === 'no-speech' && isStarted) {
                    startListening();
                }
            };

            recognition.onresult = (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                consoleLog.innerText = "USTED: " + cmd;

                let found = false;
                for (let key in localMemory) {
                    if (cmd.includes(key)) {
                        speak(localMemory[key]);
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    if (cmd.includes("busca") || cmd.includes("internet")) {
                        const query = cmd.replace("busca", "").replace("en internet", "").trim();
                        speak(`Entendido. Iniciando protocolos de búsqueda sobre ${query}.`);
                        setTimeout(() => { window.open(`https://www.google.com/search?q=${query}`, '_blank'); }, 1500);
                    } else {
                        speak("No tengo ese dato en memoria local. Consultando al mainframe.");
                        mainframeStatus.innerText = "MAINFRAME: ENVIANDO PETICIÓN...";
                    }
                }
            };

            speak("Sistemas cargados. Interfaz neural Dual Robotics activa.");
        }
    </script>
</body>
</html>
