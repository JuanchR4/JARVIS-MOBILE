<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JARVIS DEBUG - DUAL ROBOTICS</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: monospace; padding: 20px; text-transform: uppercase; }
        #log { border: 1px solid #00d4ff; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #001111; }
        button { background: #00d4ff; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; }
        .red { color: #ff3c00; }
    </style>
</head>
<body>
    <h3>SISTEMA DE DIAGNÓSTICO JARVIS</h3>
    <div id="log">SISTEMA INICIALIZADO... ESPERANDO ACCIÓN DEL USUARIO</div>
    <button onclick="diagnose()">INICIAR DIAGNÓSTICO DE VOZ</button>

    <script>
        const log = document.getElementById('log');
        const addLog = (msg, color='') => {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        };

        function diagnose() {
            addLog("PASO 1: PROBANDO SALIDA DE VOZ (SYNTHESIZER)");
            const synth = window.speechSynthesis;
            const u = new SpeechSynthesisUtterance("Prueba de audio del sistema Jarvis. Si escucha esto, el altavoz funciona.");
            u.lang = 'es-ES';
            u.onstart = () => addLog("AUDIO: HABLANDO...");
            u.onerror = (e) => addLog("ERROR EN AUDIO: " + e.error, "#ff3c00");
            u.onend = () => {
                addLog("AUDIO: PRUEBA COMPLETADA.");
                startMicTest();
            };
            synth.speak(u);
        }

        function startMicTest() {
            addLog("PASO 2: PROBANDO MICRÓFONO (RECOGNITION)");
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                addLog("ERROR: NAVEGADOR NO SOPORTA VOZ", "#ff3c00");
                return;
            }

            const rec = new SpeechRecognition();
            rec.lang = 'es-ES';
            
            rec.onstart = () => addLog("MIC: ESCUCHANDO... HABLE AHORA");
            rec.onerror = (e) => addLog("ERROR MIC: " + e.error, "#ff3c00");
            
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addLog("MIC: RECIBIDO -> " + text);
                
                if (text.toLowerCase().includes("voltaje") || text.toLowerCase().includes("298")) {
                    addLog("LÓGICA: COMANDO L298 DETECTADO", "#00ff00");
                    const ans = new SpeechSynthesisUtterance("El voltaje del L298 es 35 voltios.");
                    ans.lang = 'es-ES';
                    window.speechSynthesis.speak(ans);
                } else {
                    addLog("LÓGICA: COMANDO NO MAPEADO", "#ffcc00");
                }
            };

            rec.start();
        }
    </script>
</body>
</html>
